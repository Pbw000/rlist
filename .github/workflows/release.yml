name: Rust Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTFLAGS: "-D warnings"

jobs:
  build-linux-gnu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rlist-x86_64-unknown-linux-gnu
          path: target/x86_64-unknown-linux-gnu/release/rlist

  build-linux-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-musl

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rlist-x86_64-unknown-linux-musl
          path: target/x86_64-unknown-linux-musl/release/rlist

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rlist-x86_64-pc-windows-msvc
          path: target/release/rlist.exe

  release:
    needs: [build-linux-gnu, build-linux-musl, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rlist-*
          merge-multiple: true
          path: ${{ github.workspace }}/artifacts

      - name: List artifacts
        run: ls -la ${{ github.workspace }}/artifacts

      - name: Create release archives
        working-directory: ${{ github.workspace }}/artifacts
        run: |
          for dir in rlist-*; do
            target=$(echo $dir | sed 's/rlist-//')
            if [[ $target == *"windows"* ]]; then
              zip -r rlist-${{ github.ref_name }}-${target}.zip $dir
            else
              tar -czvf rlist-${{ github.ref_name }}-${target}.tar.gz $dir
            fi
          done

      - name: List archives
        run: ls -la ${{ github.workspace }}/artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/artifacts/rlist-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
