name: Rust Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTFLAGS: "-D warnings"

jobs:
  build-linux-gnu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --bin rlist --target x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rlist-x86_64-unknown-linux-gnu
          path: target/x86_64-unknown-linux-gnu/release/rlist
          if-no-files-found: error

  build-linux-musl:
    runs-on: ubuntu-latest
    container: rust:alpine
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        run: |
          apk add --no-cache musl-dev

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-musl

      - name: Build
        run: cargo build --release --bin rlist --target x86_64-unknown-linux-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rlist-x86_64-unknown-linux-musl
          path: target/x86_64-unknown-linux-musl/release/rlist
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        run: cargo build --release --bin rlist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rlist-x86_64-pc-windows-msvc
          path: target/release/rlist.exe
          if-no-files-found: error

  release:
    needs: [build-linux-gnu, build-linux-musl, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rlist-*
          merge-multiple: true
          path: artifacts

      - name: List downloaded artifacts
        run: ls -la artifacts

      - name: Create release archives
        run: |
          cd artifacts
          for file in *; do
            if [[ $file == *.exe ]]; then
              zip -r rlist-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip $file
            elif [[ $file == *musl* ]]; then
              tar -czvf rlist-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz $file
            else
              tar -czvf rlist-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz $file
            fi
          done

      - name: List archives
        run: ls -la artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/rlist-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
