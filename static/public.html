<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            http-equiv="Cache-Control"
            content="no-cache, no-store, must-revalidate"
        />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <title>RList 公开访问</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
        />
        <link rel="stylesheet" href="/css/style.css" />
        <link rel="stylesheet" href="/css/public.css" />
    </head>
    <body>
        <div class="container">
            <!-- Header -->
            <div class="header">
                <div class="header-left">
                    <h1><i class="ti ti-folder"></i> RList</h1>
                    <div class="breadcrumb" id="breadcrumb">
                        <a href="#" onclick="navigateTo('/')"
                            ><i class="ti ti-home"></i
                        ></a>
                    </div>
                </div>
                <div class="header-right">
                    <div class="search-box">
                        <i class="ti ti-search"></i>
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="搜索文件..."
                        />
                    </div>
                    <div
                        class="theme-toggle"
                        onclick="toggleTheme()"
                        title="切换主题"
                    >
                        <i class="ti ti-moon" id="themeIcon"></i>
                    </div>
                    <a href="/index.html" class="btn btn-secondary">
                        <i class="ti ti-login"></i> 登录
                    </a>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <button class="btn btn-primary" onclick="refresh()">
                    <i class="ti ti-refresh"></i> 刷新
                </button>
                <div style="flex: 1"></div>
                <div class="view-toggle">
                    <button
                        class="active"
                        id="listViewBtn"
                        onclick="setView('list')"
                        title="列表视图"
                    >
                        <i class="ti ti-list"></i>
                    </button>
                    <button
                        id="gridViewBtn"
                        onclick="setView('grid')"
                        title="网格视图"
                    >
                        <i class="ti ti-grid-dots"></i>
                    </button>
                </div>
            </div>

            <!-- File List -->
            <div class="file-list" id="fileList">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                <p>
                    <i class="ti ti-folder-open"></i> 公开访问模式 -
                    仅支持浏览和下载
                </p>
            </div>
        </div>

        <!-- Preview Modal -->
        <div class="modal-overlay" id="previewModal" style="display: none">
            <div class="modal preview-modal">
                <div class="preview-header">
                    <h2>
                        <i class="ti ti-eye"></i>
                        <span id="previewFileName">文件预览</span>
                    </h2>
                    <div class="preview-controls">
                        <button
                            class="preview-control-btn"
                            onclick="zoomOut()"
                            title="缩小"
                        >
                            <i class="ti ti-minus"></i>
                        </button>
                        <span id="zoomLevel">100%</span>
                        <button
                            class="preview-control-btn"
                            onclick="zoomIn()"
                            title="放大"
                        >
                            <i class="ti ti-plus"></i>
                        </button>
                        <button
                            class="preview-control-btn"
                            onclick="rotatePreview()"
                            title="旋转"
                        >
                            <i class="ti ti-rotate"></i>
                        </button>
                        <button
                            class="preview-control-btn"
                            onclick="downloadFromPreview()"
                            title="下载"
                        >
                            <i class="ti ti-download"></i>
                        </button>
                        <button
                            class="preview-control-btn"
                            onclick="hidePreviewModal()"
                            title="关闭"
                        >
                            <i class="ti ti-x"></i>
                        </button>
                    </div>
                </div>
                <div class="preview-content" id="previewContent">
                    <div class="preview-placeholder">
                        <i class="ti ti-file"></i>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Context Menu -->
        <div class="context-menu" id="contextMenu" style="display: none"></div>

        <!-- JS 模块 -->
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"
            async
        ></script>
        <script>
            // 配置 PDF.js worker
            if (typeof pdfjsLib !== "undefined") {
                pdfjsLib.GlobalWorkerOptions.workerSrc =
                    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
            }
            // 后台预加载 PDF.js
            window.addEventListener("load", () => {
                // 预加载 PDF.js worker
                if (typeof pdfjsLib !== "undefined") {
                    console.log("PDF.js 已加载");
                }
            });
        </script>
        <script src="/js/utils.js?v=20260324001"></script>
        <script src="/js/public.js?v=20260324001"></script>
    </body>
</html>
