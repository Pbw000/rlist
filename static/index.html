<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            http-equiv="Cache-Control"
            content="no-cache, no-store, must-revalidate"
        />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <title>RList 文件管理</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
        />
        <link rel="stylesheet" href="/css/style.css" />
    </head>
    <body>
        <!-- 登录/注册模态框 -->
        <div class="auth-container" id="authContainer">
            <div class="auth-card">
                <div class="auth-header">
                    <i class="ti ti-folder"></i>
                    <h1>RList</h1>
                    <p>文件管理系统</p>
                </div>
                <div class="auth-tabs">
                    <button
                        class="auth-tab active"
                        id="loginTab"
                        onclick="showAuthTab('login')"
                    >
                        登录
                    </button>
                    <button
                        class="auth-tab"
                        id="registerTab"
                        onclick="showAuthTab('register')"
                    >
                        注册
                    </button>
                </div>
                <div class="auth-form">
                    <div id="loginForm">
                        <div class="form-group">
                            <label><i class="ti ti-user"></i> 用户名</label>
                            <input
                                type="text"
                                id="loginUsername"
                                placeholder="请输入用户名"
                            />
                        </div>
                        <div class="form-group">
                            <label><i class="ti ti-lock"></i> 密码</label>
                            <input
                                type="password"
                                id="loginPassword"
                                placeholder="请输入密码"
                            />
                        </div>
                        <button class="auth-btn" onclick="handleLogin()">
                            <i class="ti ti-login"></i> 登录
                        </button>
                    </div>
                    <div id="registerForm" style="display: none">
                        <div class="form-group">
                            <label><i class="ti ti-user"></i> 用户名</label>
                            <input
                                type="text"
                                id="registerUsername"
                                placeholder="请输入用户名"
                            />
                        </div>
                        <div class="form-group">
                            <label><i class="ti ti-lock"></i> 密码</label>
                            <input
                                type="password"
                                id="registerPassword"
                                placeholder="请输入密码（至少 6 位）"
                            />
                        </div>
                        <div class="form-group">
                            <label><i class="ti ti-lock"></i> 确认密码</label>
                            <input
                                type="password"
                                id="registerPasswordConfirm"
                                placeholder="请再次输入密码"
                            />
                        </div>
                        <button class="auth-btn" onclick="handleRegister()">
                            <i class="ti ti-user-plus"></i> 注册
                        </button>
                    </div>
                </div>
                <div class="auth-footer">
                    <p id="authMessage"></p>
                </div>
            </div>
        </div>

        <div class="container" id="mainContainer" style="display: none">
            <!-- Header -->
            <div class="header">
                <div class="header-left">
                    <h1><i class="ti ti-folder"></i> RList</h1>
                    <div class="breadcrumb" id="breadcrumb">
                        <a href="#" onclick="navigateTo('/')"
                            ><i class="ti ti-home"></i
                        ></a>
                    </div>
                </div>
                <div class="header-right">
                    <div class="search-box">
                        <i class="ti ti-search"></i>
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="搜索文件..."
                        />
                    </div>
                    <div class="user-info" id="userInfo" style="display: none">
                        <i class="ti ti-user-circle"></i>
                        <span id="usernameDisplay"></span>
                        <button
                            class="btn btn-secondary btn-icon"
                            onclick="logout()"
                            title="退出登录"
                        >
                            <i class="ti ti-logout"></i>
                        </button>
                    </div>
                    <button
                        class="theme-toggle"
                        onclick="toggleTheme()"
                        title="切换主题"
                    >
                        <i class="ti ti-moon" id="themeIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Admin Panel -->
            <div class="admin-panel" id="adminPanel" style="display: none">
                <i class="ti ti-shield-lock"></i>
                <span>管理员模式</span>
                <input
                    type="text"
                    id="adminKeyInput"
                    placeholder="管理员密钥"
                />
                <button class="btn btn-primary" onclick="setAdminKey()">
                    认证
                </button>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <button class="btn btn-primary" onclick="showNewFolderModal()">
                    <i class="ti ti-folder-plus"></i> 新建文件夹
                </button>
                <button
                    class="btn btn-primary"
                    onclick="document.getElementById('uploadInput').click()"
                >
                    <i class="ti ti-upload"></i> 上传文件
                </button>
                <input
                    type="file"
                    id="uploadInput"
                    style="display: none"
                    multiple
                    onchange="handleUploadFiles(this.files)"
                />
                <button class="btn btn-secondary" onclick="refresh()">
                    <i class="ti ti-refresh"></i> 刷新
                </button>
                <button
                    class="btn btn-danger"
                    id="deleteBtn"
                    style="display: none"
                    onclick="deleteSelected()"
                >
                    <i class="ti ti-trash"></i> 删除选中
                </button>
                <button class="btn btn-secondary" onclick="toggleAdminPanel()">
                    <i class="ti ti-settings"></i> 管理
                </button>
                <div style="flex: 1"></div>
                <div class="view-toggle">
                    <button
                        class="active"
                        id="listViewBtn"
                        onclick="setView('list')"
                        title="列表视图"
                    >
                        <i class="ti ti-list"></i>
                    </button>
                    <button
                        id="gridViewBtn"
                        onclick="setView('grid')"
                        title="网格视图"
                    >
                        <i class="ti ti-grid-dots"></i>
                    </button>
                </div>
            </div>

            <!-- File List -->
            <div class="file-list" id="fileList">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- New Folder Modal -->
        <div class="modal-overlay" id="newFolderModal" style="display: none">
            <div class="modal">
                <h2><i class="ti ti-folder-plus"></i> 新建文件夹</h2>
                <input
                    type="text"
                    id="folderNameInput"
                    placeholder="文件夹名称"
                />
                <div class="modal-actions">
                    <button
                        class="btn btn-secondary"
                        onclick="hideNewFolderModal()"
                    >
                        取消
                    </button>
                    <button class="btn btn-primary" onclick="createFolder()">
                        创建
                    </button>
                </div>
            </div>
        </div>

        <!-- Rename Modal -->
        <div class="modal-overlay" id="renameModal" style="display: none">
            <div class="modal">
                <h2><i class="ti ti-edit"></i> 重命名</h2>
                <input type="text" id="renameInput" placeholder="新名称" />
                <div class="modal-actions">
                    <button
                        class="btn btn-secondary"
                        onclick="hideRenameModal()"
                    >
                        取消
                    </button>
                    <button class="btn btn-primary" onclick="confirmRename()">
                        确定
                    </button>
                </div>
            </div>
        </div>

        <!-- Preview Modal -->
        <div class="modal-overlay" id="previewModal" style="display: none">
            <div class="modal preview-modal">
                <div class="preview-header">
                    <h2>
                        <i class="ti ti-eye"></i>
                        <span id="previewFileName">文件预览</span>
                    </h2>
                    <div class="preview-controls">
                        <button
                            class="preview-control-btn"
                            onclick="zoomOut()"
                            title="缩小"
                        >
                            <i class="ti ti-minus"></i>
                        </button>
                        <span id="zoomLevel">100%</span>
                        <button
                            class="preview-control-btn"
                            onclick="zoomIn()"
                            title="放大"
                        >
                            <i class="ti ti-plus"></i>
                        </button>
                        <button
                            class="preview-control-btn"
                            onclick="rotatePreview()"
                            title="旋转"
                        >
                            <i class="ti ti-rotate"></i>
                        </button>
                        <button
                            class="preview-control-btn"
                            onclick="downloadFromPreview()"
                            title="下载"
                        >
                            <i class="ti ti-download"></i>
                        </button>
                        <button
                            class="preview-control-btn"
                            onclick="hidePreviewModal()"
                            title="关闭"
                        >
                            <i class="ti ti-x"></i>
                        </button>
                    </div>
                </div>
                <div class="preview-content" id="previewContent">
                    <div class="preview-placeholder">
                        <i class="ti ti-file"></i>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Copy/Move Modal -->
        <div class="modal-overlay" id="copyMoveModal" style="display: none">
            <div class="modal">
                <h2 id="copyMoveTitle">
                    <i class="ti ti-copy"></i> 复制/移动文件
                </h2>
                <input
                    type="text"
                    id="targetPathInput"
                    placeholder="目标路径"
                    readonly
                    onclick="showPathSelector()"
                    style="cursor: pointer"
                />
                <div
                    id="pathSelectorStatus"
                    style="
                        font-size: 12px;
                        color: var(--text-secondary);
                        margin-bottom: 8px;
                    "
                >
                    点击输入框选择路径
                </div>
                <select id="copyMoveType">
                    <option value="copy">复制</option>
                    <option value="move">移动</option>
                </select>
                <div class="modal-actions">
                    <button
                        class="btn btn-secondary"
                        onclick="hideCopyMoveModal()"
                    >
                        取消
                    </button>
                    <button class="btn btn-primary" onclick="confirmCopyMove()">
                        确定
                    </button>
                </div>
            </div>
        </div>

        <!-- Path Selector Modal -->
        <div class="modal-overlay" id="pathSelectorModal" style="display: none">
            <div class="modal" style="max-width: 500px">
                <h2><i class="ti ti-folder"></i> 选择目标路径</h2>
                <div
                    id="pathSelectorContent"
                    style="max-height: 300px; overflow-y: auto"
                >
                    <div class="loading"><div class="spinner"></div></div>
                </div>
                <div class="modal-actions">
                    <button
                        class="btn btn-secondary"
                        onclick="hidePathSelector()"
                    >
                        取消
                    </button>
                    <button
                        class="btn btn-primary"
                        onclick="confirmPathSelection()"
                    >
                        确定
                    </button>
                </div>
            </div>
        </div>

        <!-- Upload Progress Modal -->
        <div
            class="modal-overlay"
            id="uploadProgressModal"
            style="display: none"
        >
            <div class="modal">
                <h2><i class="ti ti-upload"></i> 上传进度</h2>
                <div
                    id="uploadProgressContent"
                    style="max-height: 300px; overflow-y: auto"
                ></div>
                <div class="modal-actions">
                    <button
                        class="btn btn-primary"
                        onclick="hideUploadProgressModal()"
                    >
                        关闭
                    </button>
                </div>
            </div>
        </div>

        <!-- Context Menu -->
        <div class="context-menu" id="contextMenu" style="display: none"></div>

        <!-- JS 模块 -->
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"
            async
        ></script>
        <script>
            // 配置 PDF.js worker
            if (typeof pdfjsLib !== "undefined") {
                pdfjsLib.GlobalWorkerOptions.workerSrc =
                    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
            }
            // 后台预加载 PDF.js
            window.addEventListener("load", () => {
                // 预加载 PDF.js worker
                if (typeof pdfjsLib !== "undefined") {
                    console.log("PDF.js 已加载");
                }
            });
        </script>
        <script src="/js/utils.js?v=20240323004"></script>
        <script src="/js/api.js?v=20240323004"></script>
        <script src="/js/file-manager.js?v=20240323004"></script>
        <script src="/js/upload.js?v=20240323004"></script>
        <script src="/js/app.js?v=20240323004"></script>
    </body>
</html>
